name: 每日股市訊號分析

on:
  schedule:
    # 台灣時間 14:06 = UTC 06:06，避開 GitHub Actions 整點高負載
    - cron: '6 6 * * *'
    # 台灣時間 14:21 = UTC 06:21，備援觸發；程式會檢查同日是否已產出，避免重複寄送
    - cron: '21 6 * * *'
  workflow_dispatch:          # 允許手動在網頁上觸發

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install yfinance pandas requests playwright google-api-python-client google-auth
          playwright install --with-deps chromium

      - name: 執行訊號分析
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
        run: python stock_market_tracking_system.py
