name: 每日股市訊號分析

on:
  schedule:
    # 台灣時間 14:06 = UTC 06:06，避開 GitHub Actions 整點高負載
    - cron: '6 6 * * *'
  workflow_dispatch:          # 允許手動在網頁上觸發

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-signal:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install yfinance pandas requests

      - name: 執行訊號分析
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python 0050_signal_system.py
